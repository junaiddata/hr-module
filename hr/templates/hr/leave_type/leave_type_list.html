<!DOCTYPE html>
<html>
<head>
    <title>Leave Types List</title>
    <style>
        table { border-collapse: collapse; width: 60%; margin: 20px auto; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        h1 { text-align: center; }
        .action-btn { padding: 4px 10px; margin-right: 5px; text-decoration: none; border-radius: 3px; }
        .edit-btn { background: #4CAF50; color: white; }
        .delete-btn { background: #f44336; color: white; }
    </style>
</head>
<body>
    <h1>Leave Types</h1>
    <div style="text-align: center; margin-bottom: 20px;">
        <a href="{% url 'leave_type_create' %}" class="action-btn edit-btn">+ Add New Leave Type</a>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Leave Type Name</th>

                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for leave_type in leave_types %}
            <tr>
                <td>{{ leave_type.id }}</td>
                <td>{{ leave_type.name }}</td>

                <td>
                    <a href="{% url 'leave_type_edit' leave_type.id %}" class="action-btn edit-btn">Edit</a>
                    <a href="{% url 'leave_type_delete' leave_type.id %}" class="action-btn delete-btn" onclick="return confirm('Are you sure you want to delete this leave type?');">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4">No leave types available.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
