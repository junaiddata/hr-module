{% extends "hr/base.html" %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0"><i class="fas fa-calendar-plus me-2"></i>{% if leave %}Edit{% else %}Add New{% endif %} Leave</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <!-- Employee Selection -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label fw-bold">Employee</label>
                            <select name="employee" class="form-select" required>
                                <option value="" disabled {% if not leave %}selected{% endif %}>Select Employee</option>
                                {% for emp in employees %}
                                    <option value="{{ emp.id }}" {% if leave and emp.id == leave.employee.id %}selected{% endif %}>
                                        {{ emp.emp_name }} ({{ emp.emp_id }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!-- Leave Type -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label fw-bold">Leave Type</label>
                            <select name="leave_type" class="form-select" required>
                                <option value="" disabled {% if not leave %}selected{% endif %}>Select Leave Type</option>
                                {% for lt in leave_types %}
                                    <option value="{{ lt.id }}" {% if leave and lt.id == leave.leave_type.id %}selected{% endif %}>
                                        {{ lt.name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <!-- Expected Leave Dates -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label fw-bold">Expected From</label>
                            <input type="date" name="expected_from" id="expected_from" class="form-control" required
                                   value="{% if leave %}{{ leave.expected_from|date:'Y-m-d' }}{% endif %}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label fw-bold">Expected To</label>
                            <input type="date" name="expected_to" id="expected_to" class="form-control" required
                                   value="{% if leave %}{{ leave.expected_to|date:'Y-m-d' }}{% endif %}">
                        </div>
                    </div>

                    <!-- Reported To -->
                    <div class="col-md-12">
                        <div class="form-group">
                            <label class="form-label fw-bold">Reported To</label>
                            <input type="text" name="reported_to" class="form-control" required
                                   value="{% if leave %}{{ leave.reported_to }}{% endif %}" placeholder="Enter HR /manager name">
                        </div>
                    </div>

                    <!-- Same as expected checkbox -->
                    <div class="col-md-12">
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="same_as_expected">
                            <label class="form-check-label" for="same_as_expected">
                                Same as expected dates
                            </label>
                        </div>
                    </div>

                    <!-- Actual Leave Dates -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label fw-bold">Actual From</label>
                            <input type="date" name="actual_from" id="actual_from" class="form-control"
                                   value="{% if leave and leave.actual_from %}{{ leave.actual_from|date:'Y-m-d' }}{% endif %}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label fw-bold">Actual To</label>
                            <input type="date" name="actual_to" id="actual_to" class="form-control"
                                   value="{% if leave and leave.actual_to %}{{ leave.actual_to|date:'Y-m-d' }}{% endif %}">
                        </div>
                    </div>

                    <!-- Rejoined On -->
                    <div class="col-md-6">
                        <div class="form-group">
                            <label class="form-label fw-bold">Rejoined On</label>
                            <input type="date" name="rejoined_on" class="form-control"
                                   value="{% if leave and leave.rejoined_on %}{{ leave.rejoined_on|date:'Y-m-d' }}{% endif %}">
                        </div>
                    </div>

                    <!-- Reason -->
                    <div class="col-md-12">
                        <div class="form-group">
                            <label class="form-label fw-bold">Reason</label>
                            <textarea name="reason" class="form-control" rows="3" required>{{ leave.reason|default_if_none:'' }}</textarea>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-primary px-4 py-2">
                            <i class="fas fa-paper-plane me-2"></i>{% if leave %}Update{% else %}Submit Leave Request{% endif %}
                        </button>
                        <a href="{% url 'leave_history' %}" class="btn btn-outline-secondary ms-2 px-4 py-2">
                            <i class="fas fa-times me-2"></i>Cancel
                        </a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>


<style>
    .form-label {
        color: #495057;
        margin-bottom: 0.5rem;
    }
    .form-control, .form-select {
        border-radius: 0.375rem;
        padding: 0.5rem 1rem;
        border: 1px solid #ced4da;
    }
    .form-control:focus, .form-select:focus {
        border-color: #86b7fe;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }
    textarea {
        min-height: 100px;
        resize: vertical;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sameAsExpectedCheckbox = document.getElementById('same_as_expected');
        const expectedFromInput = document.getElementById('expected_from');
        const expectedToInput = document.getElementById('expected_to');
        const actualFromInput = document.getElementById('actual_from');
        const actualToInput = document.getElementById('actual_to');

        // Function to copy expected dates to actual dates
        function copyDates() {
            if (sameAsExpectedCheckbox.checked) {
                actualFromInput.value = expectedFromInput.value;
                actualToInput.value = expectedToInput.value;
            }
        }

        // Event listener for checkbox change
        sameAsExpectedCheckbox.addEventListener('change', copyDates);

        // Event listeners for expected date changes
        expectedFromInput.addEventListener('change', function() {
            if (sameAsExpectedCheckbox.checked) {
                actualFromInput.value = this.value;
            }
        });

        expectedToInput.addEventListener('change', function() {
            if (sameAsExpectedCheckbox.checked) {
                actualToInput.value = this.value;
            }
        });
    });
</script>

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

{% endblock %}
