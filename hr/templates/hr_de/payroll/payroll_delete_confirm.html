{% extends "hr_de/base.html" %}
{% block title %}Delete Payroll Run{% endblock %}
{% block content %}
<div style="max-width:520px;margin:3rem auto;padding:0 1rem;">
    <div class="card border-0 shadow-sm">
        <div class="card-body p-4 text-center">
            <div style="width:60px;height:60px;border-radius:50%;background:#fee2e2;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
                <i class="fas fa-trash-alt" style="font-size:1.4rem;color:#dc2626;"></i>
            </div>
            <h4 style="font-weight:700;margin-bottom:.5rem;">Delete Payroll Run?</h4>
            <p style="color:#64748b;font-size:.9rem;margin-bottom:1.5rem;">
                <strong>{{ run }}</strong><br>
                {{ run.entries.count }} employee entries will be permanently removed.
                This cannot be undone.
            </p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <a href="{% url 'payroll_detail' run.pk %}" class="btn btn-outline-secondary px-4">Cancel</a>
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="fas fa-trash-alt me-2"></i>Yes, Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
