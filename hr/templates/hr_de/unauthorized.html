<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - HR System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Base styles for a clean look */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc; /* Light gray background */
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Styles from the original template block */
        .error-container {
            max-width: 500px;
            margin: 2rem auto;
            text-align: center;
        }
        
        .error-card {
            background: #ffffff;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
        }
        
        .error-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: #dc2626;
            font-size: 2.5rem;
        }
        
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 1rem;
        }
        
        .error-subtitle {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        
        .contact-info {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: left; /* Make text inside contact info look better */
        }

        .contact-info h3 {
            margin-top: 0;
            color: #0f172a;
        }

        .contact-info p {
            margin-bottom: 0.5rem;
        }

        /* Button styles (simple custom ones since no framework is used) */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.3s, box-shadow 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .btn i {
            margin-right: 0.5rem;
        }

        .btn-primary {
            background-color: #007bff; /* Primary Blue */
            color: white;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        .btn-secondary {
            background-color: #f1f5f9; /* Light Gray */
            color: #475569;
            border-color: #cbd5e1;
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
            box-shadow: 0 4px 10px rgba(100, 116, 139, 0.1);
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-shield-alt"></i>
        </div>
        
        <h1 class="error-title">Access Denied</h1>
        <p class="error-subtitle">You are not authorized to view this page</p>
        
        <div class="contact-info">
            <h3><i class="fas fa-headset"></i> Contact HR Administrator</h3>
            <p>Please contact the HR department for access permissions:</p>
            <p><strong>Email:</strong> <a href="mailto:hr-admin@company.com">hr-admin@company.com</a></p>
            <p><strong>Phone:</strong> +1 (555) 123-4567</p>
        </div>
        
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
            <a href="/employee/home" class="btn btn-primary"> 
                <i class="fas fa-home"></i> Return to Home
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Go Back
            </a>
        </div>
    </div>
</div>

</body>
</html>
